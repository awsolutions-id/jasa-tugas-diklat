<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Furniture 4x4 Mobile</title>
    <style>
        /* Mengatur agar layout responsif dan berpusat */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px; /* Padding lebih kecil untuk mobile */
            box-sizing: border-box;
        }

        /* Container utama dengan warna latar belakang putih */
        .portfolio-container {
            background-color: #fff;
            width: 100%;
            max-width: 1200px;
            padding: 30px; /* Padding lebih kecil untuk mobile */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Judul Portofolio */
        .portfolio-header {
            font-size: 36px; /* Font lebih kecil untuk mobile */
            font-weight: 800;
            color: #0d2c4b;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -1.5px;
        }

        /* Grid untuk 4 kolom kartu, dipaksa 4 kolom di semua layar */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 kolom sama lebar */
            gap: 10px; /* Jarak antar kartu lebih kecil untuk mobile */
            width: 100%;
        }

        /* Kartu individu */
        .portfolio-item {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s ease-in-out;
        }

        /* Container gambar berbentuk kotak (1:1) */
        .image-container {
            width: 100%;
            padding-top: 100%; /* Membuat kotak aspek rasio 1:1 */
            position: relative;
            background-color: #f0f0f0;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Gambar di dalam container, dipaksa agar masuk sepenuhnya */
        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Menampilkan seluruh gambar tanpa terpotong */
            object-position: center;
        }

        /* Container untuk tombol detail warna kuning */
        .details-bar {
            background-color: #f2e185; /* Warna kuning dari desain */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0; /* Padding sangat kecil untuk mobile */
            text-decoration: none;
            color: black;
            font-weight: 600;
            font-size: 10px; /* Font sangat kecil agar muat */
            cursor: pointer;
            width: 100%;
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        /* Simbol mata (menggunakan emoji untuk kesederhanaan) */
        .icon-eye {
            font-size: 12px;
            margin-right: 4px;
        }
    </style>
</head>
<body>
