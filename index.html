<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        biruTua: '#0A2463',  /* Warna tulisan Portofolio */
                        kuning: '#F3D278',   /* Warna bingkai dan kotak detail */
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            /* Gaya judul sesuai gambar */
            .judul-portofolio {
                @apply text-[clamp(2.8rem,8vw,5rem)] font-black text-biruTua tracking-wider;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            }
            /* Bingkai foto persegi */
            .bingkai-foto {
                @apply w-full aspect-square border-[5px] border-kuning rounded-sm overflow-hidden flex flex-col;
            }
            /* Kotak di bawah foto untuk tulisan dan ikon */
            .kotak-detail {
                @apply bg-kuning text-biruTua font-medium text-lg py-3 px-4 w-full flex justify-between items-center;
            }
        }
    </style>
</head>
